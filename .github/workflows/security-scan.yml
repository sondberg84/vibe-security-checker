name: Vibe Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Checkout vibe-security-checker
        uses: actions/checkout@v4
        with:
          repository: sondberg84/vibe-security-checker
          path: vibe-security-checker

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run security scan
        run: |
          # Use baseline if present (suppresses pre-existing findings, only alerts on new ones)
          if [ -f ".vibe-security-baseline.json" ]; then
            echo "Baseline found — reporting new findings only"
            python vibe-security-checker/scripts/scan_security.py . \
              --full --json \
              --baseline .vibe-security-baseline.json \
              > scan_results.json
          else
            echo "No baseline — reporting all findings"
            python vibe-security-checker/scripts/scan_security.py . \
              --full --json \
              > scan_results.json
          fi
          cat scan_results.json

      - name: Fail on new critical findings
        run: |
          python -c "
          import json, sys
          d = json.load(open('scan_results.json'))
          new = d['total_findings']
          suppressed = d.get('suppressed_by_baseline', 0)
          if suppressed:
              print(f'{suppressed} existing finding(s) suppressed by baseline')
          if d['critical'] > 0:
              print(f'BLOCKED: {d[\"critical\"]} new critical finding(s)')
              sys.exit(1)
          print(f'OK: {new} new finding(s), none critical')
          "

      - name: Generate SARIF report
        if: always()
        run: |
          BASELINE_FLAG=""
          [ -f ".vibe-security-baseline.json" ] && BASELINE_FLAG="--baseline .vibe-security-baseline.json"
          python vibe-security-checker/scripts/generate_report.py . \
            --format sarif \
            --output results.sarif \
            $BASELINE_FLAG

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
