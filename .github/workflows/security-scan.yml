name: Vibe Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Checkout vibe-security-checker
        uses: actions/checkout@v4
        with:
          repository: sondberg84/vibe-security-checker
          path: vibe-security-checker

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run security scan
        run: |
          python vibe-security-checker/scripts/scan_security.py . --full --json > scan_results.json
          cat scan_results.json

      - name: Fail on critical findings
        run: |
          CRITICAL=$(python -c "import json,sys; d=json.load(open('scan_results.json')); sys.exit(1) if d['critical'] > 0 else sys.exit(0)")

      - name: Upload SARIF to GitHub Security tab
        if: always()
        run: |
          python vibe-security-checker/scripts/generate_report.py . --format sarif --output results.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
